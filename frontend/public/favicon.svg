<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(255, 69, 0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255, 165, 0);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="100" height="100" rx="18" ry="18" fill="url(#logoGradient)" filter="url(#shadow)"/>
  <text x="15" y="85" font-family="'Lobster Two', cursive, serif" font-size="42" font-weight="bold" fill="white" text-anchor="start">OS</text>
</svg>
