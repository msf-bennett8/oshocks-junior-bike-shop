[build]
builder = "nixpacks"

[build.nixpacks]
aptPackages = ["php", "php-mbstring", "php-xml", "php-curl", "php-pgsql", "php-mysql", "php-zip", "php-bcmath", "php-tokenizer", "php-json", "php-ctype", "php-fileinfo", "php-openssl", "composer"]

[build.nixpacks.buildCommands]
cmd = "cd backend && composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache && php artisan view:cache"

[deploy]
startCommand = "cd backend && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
